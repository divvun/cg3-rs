name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: clippy + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # `--all-targets` builds lib + bins + examples + tests, so these two steps
      # are the full compile-and-lint gate. `--features profiler` additionally
      # pulls in rusqlite + the cg-annotate / cg-merge-annotations binaries.
      - name: Clippy (default features)
        run: cargo clippy --all-targets -p cg3 -- -D warnings

      - name: Clippy (profiler feature)
        run: cargo clippy --all-targets -p cg3 --features profiler -- -D warnings

      - name: Tests (default features)
        run: cargo nextest run -p cg3

      - name: Tests (profiler feature)
        run: cargo nextest run -p cg3 --features profiler

      - name: Doctests
        run: cargo test -p cg3 --doc
